<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Book Full of Us – Radwa & Nour ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Poppins:wght@200;300;400;500&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff2d78;--pink-soft:#ff6fa8;--purple:#a855f7;
  --glow-pink:rgba(255,45,120,.55);--glow-purple:rgba(168,85,247,.45);
  --bg:#030007;--text:#f5e6ff;--muted:#b89ec4;--gold:#f0c060;
  --pw:320px;--ph:440px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Poppins',sans-serif;color:var(--text)}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.blob{position:fixed;border-radius:50%;filter:blur(130px);opacity:.15;pointer-events:none;z-index:0;animation:blobDrift 18s ease-in-out infinite alternate}
.b1{width:550px;height:550px;background:var(--purple);top:-180px;left:-180px}
.b2{width:480px;height:480px;background:var(--pink);bottom:-140px;right:-140px;animation-delay:-9s}
.b3{width:380px;height:380px;background:#3b0764;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-5s}
@keyframes blobDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(35px,25px) scale(1.07)}}

/* LOADER */
#loader{position:fixed;inset:0;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity 1s ease,visibility 1s ease}
#loader.hide{opacity:0;visibility:hidden;pointer-events:none}
.ld-title{font-family:'Dancing Script',cursive;font-size:clamp(2rem,6vw,3.6rem);background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gPulse 2s ease-in-out infinite;margin-bottom:2rem}
@keyframes gPulse{0%,100%{filter:drop-shadow(0 0 8px var(--glow-pink))}50%{filter:drop-shadow(0 0 26px var(--glow-pink))}}
.ld-track{width:260px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden}
.ld-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--pink),var(--purple));border-radius:99px;box-shadow:0 0 12px var(--glow-pink);transition:width .12s linear}
.ld-sub{margin-top:1.2rem;font-size:.7rem;letter-spacing:.2em;color:var(--muted);opacity:.6}

/* SCENE */
#scene{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center}

#bookOuter{
  opacity:0;transform:scale(.82) translateY(28px);
  transition:opacity 1.4s ease,transform 1.4s cubic-bezier(.16,1,.3,1);
  position:relative;
}
#bookOuter.show{opacity:1;transform:scale(1) translateY(0)}

/* THE BOOK: two side-by-side panels */
#book{
  display:flex;
  width:calc(var(--pw)*2);
  height:var(--ph);
  position:relative;
  filter:drop-shadow(0 0 40px var(--glow-pink)) drop-shadow(0 0 90px var(--glow-purple));
  animation:bookGlow 4s ease-in-out infinite alternate;
}
@keyframes bookGlow{
  0%{filter:drop-shadow(0 0 35px var(--glow-pink)) drop-shadow(0 0 80px var(--glow-purple))}
  100%{filter:drop-shadow(0 0 55px var(--glow-pink)) drop-shadow(0 0 120px var(--glow-purple))}
}
/* spine shadow */
#book::after{
  content:'';position:absolute;left:50%;top:0;
  transform:translateX(-50%);
  width:8px;height:100%;
  background:linear-gradient(to right,#0d0018,#2a0045,#0d0018);
  z-index:50;box-shadow:0 0 16px rgba(168,85,247,.6);
}

/* each panel is one page-width */
.panel{
  width:var(--pw);height:var(--ph);
  position:relative;overflow:hidden;
  perspective:1600px;
}
#lPanel{border-radius:6px 0 0 6px}
#rPanel{border-radius:0 6px 6px 0}

/* static bg of panel */
.pbg{
  position:absolute;inset:0;
  background:linear-gradient(160deg,#130020 0%,#0a0014 100%);
  border:1px solid rgba(168,85,247,.15);
}
#lPanel .pbg{border-radius:6px 0 0 6px;border-right:none}
#rPanel .pbg{border-radius:0 6px 6px 0;border-left:none}

/* THE FLIP CARD lives inside each panel */
.fcard{
  position:absolute;inset:0;
  transform-style:preserve-3d;
  transition:transform .72s cubic-bezier(.645,.045,.355,1);
  z-index:10;
}
/* left panel: flips around its RIGHT edge */
#lCard{transform-origin:right center}
/* right panel: flips around its LEFT edge */
#rCard{transform-origin:left center}

/* when flipping forward: left card opens like turning a right-hand page */
#lCard.flip{transform:rotateY(-180deg)}
/* right card mirrors */
#rCard.flip{transform:rotateY(180deg)}

/* faces */
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  overflow:hidden;
}
.fback{transform:rotateY(180deg)}
#rCard .fback{transform:rotateY(-180deg)}

/* page-turn drop shadow overlay */
.pshadow{
  position:absolute;inset:0;pointer-events:none;z-index:20;
  opacity:0;transition:opacity .36s ease;
}
#lPanel .pshadow{background:linear-gradient(to left,rgba(0,0,0,.55),transparent)}
#rPanel .pshadow{background:linear-gradient(to right,rgba(0,0,0,.55),transparent)}
#lCard.flip~.pshadow,#rCard.flip~.pshadow{opacity:1}

/* PAGE CONTENT */
.pg{
  width:100%;height:100%;
  background:linear-gradient(160deg,#140020 0%,#0a0014 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:22px 18px;
  position:relative;overflow:hidden;
}
.pg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(168,85,247,.05) 0%,transparent 55%,rgba(255,45,120,.05) 100%);
  pointer-events:none;
}
.pgn{position:absolute;bottom:9px;font-size:.52rem;color:var(--muted);letter-spacing:.15em;opacity:.5}
.pgn.l{left:12px}.pgn.r{right:12px}

/* COVER */
.cv-roses{font-size:1.7rem;letter-spacing:.22em;animation:floatY 3s ease-in-out infinite;margin-bottom:7px;text-align:center}
.cv-img{width:108px;height:108px;border-radius:50%;border:2px solid var(--pink);box-shadow:0 0 22px var(--glow-pink),0 0 50px var(--glow-purple);background:linear-gradient(135deg,#2d0050,#0d0018);display:flex;align-items:center;justify-content:center;font-size:2.8rem;margin:7px auto}
.cv-title{font-family:'Dancing Script',cursive;font-size:clamp(1.2rem,3vw,1.9rem);background:linear-gradient(135deg,var(--pink-soft),var(--gold),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 10px var(--glow-pink));line-height:1.2;text-align:center}
.cv-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;color:var(--muted);letter-spacing:.12em;margin:4px 0 10px;text-align:center}
.cv-line{width:66px;height:1px;background:linear-gradient(90deg,transparent,var(--pink),transparent);margin:5px auto}
.cv-hint{font-size:.56rem;letter-spacing:.2em;color:var(--pink);opacity:.7;text-transform:uppercase;animation:blink 2s ease-in-out infinite;text-align:center;cursor:pointer}
@keyframes blink{0%,100%{opacity:.35}50%{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* MEMORY */
.mtag{font-size:.5rem;letter-spacing:.28em;text-transform:uppercase;color:var(--pink);margin-bottom:4px}
.mtitle{font-family:'Dancing Script',cursive;font-size:clamp(1rem,2.5vw,1.4rem);background:linear-gradient(135deg,var(--pink-soft),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px var(--glow-pink));text-align:center;margin-bottom:5px}
.mthumb{width:100%;height:116px;border-radius:8px;border:1px solid rgba(255,45,120,.3);box-shadow:0 0 16px rgba(255,45,120,.15);margin:5px 0;background:rgba(255,45,120,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:.58rem;color:var(--muted)}
.mthumb .big{font-size:2.2rem}
.mbody{font-family:'Cormorant Garamond',serif;font-size:clamp(.7rem,1.6vw,.85rem);line-height:1.72;color:var(--muted);text-align:center;font-style:italic}
.mdate{font-size:.48rem;color:var(--purple);letter-spacing:.18em;margin-top:5px;opacity:.7}
.deco{width:42px;height:1px;background:linear-gradient(90deg,transparent,var(--purple),transparent);margin:5px auto}

/* POETRY */
.pg.po{background:radial-gradient(ellipse at 30% 70%,rgba(168,85,247,.09),transparent 65%),radial-gradient(ellipse at 70% 30%,rgba(255,45,120,.07),transparent 65%),#0a0012}
.po-orn{font-size:1.4rem;opacity:.35;margin:7px 0}
.po-body{font-family:'Cormorant Garamond',serif;font-size:clamp(.76rem,1.8vw,.97rem);font-style:italic;line-height:1.95;color:var(--text);text-align:center;max-width:92%}
.po-body em{background:linear-gradient(135deg,var(--pink-soft),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal}
.po-lbl{font-size:.5rem;letter-spacing:.28em;color:var(--pink);margin-top:11px;opacity:.55;text-transform:uppercase}

/* BIRTHDAY */
.pg.bd{background:radial-gradient(ellipse at center,#1a002a,#030007 80%);text-align:center}
.bd-ico{font-size:2rem;animation:floatY 2.5s ease-in-out infinite}
.bd-title{font-family:'Dancing Script',cursive;font-size:clamp(1rem,2.5vw,1.55rem);background:linear-gradient(135deg,var(--gold),var(--pink-soft),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px var(--glow-pink));margin:5px 0 3px}
.bd-sub{font-family:'Cormorant Garamond',serif;font-size:.7rem;color:var(--muted);font-style:italic;margin-bottom:10px}
.cd-row{display:flex;gap:5px;justify-content:center;margin:6px 0}
.cdb{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.3);border-radius:8px;padding:6px 7px;min-width:46px;box-shadow:0 0 12px rgba(255,45,120,.14)}
.cdn{font-size:1.25rem;font-weight:300;color:var(--pink);display:block;line-height:1;text-shadow:0 0 10px var(--glow-pink)}
.cdl{font-size:.4rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;display:block;margin-top:3px}
.bd-msg{font-family:'Cormorant Garamond',serif;font-size:.7rem;font-style:italic;color:var(--muted);line-height:1.75;max-width:90%;margin:6px auto 0}
.bd-msg span{background:linear-gradient(135deg,var(--pink-soft),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* CONTROLS */
#controls{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:7px;align-items:center;flex-wrap:wrap;justify-content:center;
  opacity:0;transition:opacity 1s ease 2s;max-width:96vw;
}
#controls.show{opacity:1}
.cb{
  background:rgba(255,45,120,.12);border:1px solid rgba(255,45,120,.38);
  color:var(--text);font-family:'Poppins',sans-serif;font-size:.54rem;
  letter-spacing:.13em;text-transform:uppercase;padding:7px 12px;
  border-radius:99px;cursor:pointer;backdrop-filter:blur(10px);
  transition:all .3s ease;white-space:nowrap;
}
.cb:hover{background:rgba(255,45,120,.26);box-shadow:0 0 18px var(--glow-pink);transform:translateY(-2px)}
.cb.on{background:rgba(255,45,120,.32);box-shadow:0 0 18px var(--glow-pink)}
#viz{display:flex;gap:2px;align-items:flex-end;height:16px}
.vb{width:3px;background:linear-gradient(to top,var(--pink),var(--purple));border-radius:2px;height:4px;opacity:.3}
.vb.on{opacity:1;animation:vbD .5s ease-in-out infinite alternate}
@keyframes vbD{0%{height:4px}100%{height:16px}}
.vb:nth-child(1){animation-delay:0s}.vb:nth-child(2){animation-delay:.1s}.vb:nth-child(3){animation-delay:.2s}.vb:nth-child(4){animation-delay:.3s}.vb:nth-child(5){animation-delay:.15s}

.navbtn{
  position:fixed;top:50%;transform:translateY(-50%);z-index:20;
  background:rgba(255,45,120,.1);border:1px solid rgba(255,45,120,.3);
  color:var(--pink);width:38px;height:38px;border-radius:50%;cursor:pointer;
  font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);transition:all .3s ease;opacity:0;
}
.navbtn.show{opacity:1}
.navbtn:hover{background:rgba(255,45,120,.28);box-shadow:0 0 18px var(--glow-pink)}
#navL{left:12px}#navR{right:12px}

#pgCtr{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:20;
  font-size:.56rem;letter-spacing:.2em;color:var(--muted);opacity:0;
  transition:opacity 1s ease 2s;background:rgba(0,0,0,.4);padding:5px 13px;
  border-radius:99px;border:1px solid rgba(255,45,120,.15);backdrop-filter:blur(8px);
}
#pgCtr.show{opacity:1}

.floater{position:fixed;pointer-events:none;z-index:30;animation:floatUp 3.5s ease-out forwards}
@keyframes floatUp{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(-95vh) rotate(360deg) scale(.2);opacity:0}}

#secret{position:fixed;inset:0;z-index:60;background:rgba(3,0,7,.95);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .5s ease}
#secret.open{opacity:1;visibility:visible}
.sc-box{max-width:440px;width:90%;text-align:center;padding:36px 28px;border:1px solid rgba(255,45,120,.3);border-radius:20px;background:rgba(255,45,120,.04);box-shadow:0 0 60px var(--glow-pink),0 0 120px var(--glow-purple)}
.sc-ico{font-size:2.8rem;margin-bottom:12px}
.sc-title{font-family:'Dancing Script',cursive;font-size:2rem;background:linear-gradient(135deg,var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.sc-body{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;line-height:1.9;color:var(--muted);margin-bottom:22px}
.sc-body strong{background:linear-gradient(135deg,var(--pink-soft),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-style:normal;font-weight:400}
.sc-close{background:linear-gradient(135deg,var(--pink),var(--purple));border:none;color:#fff;font-family:'Poppins',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:10px 24px;border-radius:99px;cursor:pointer;transition:all .3s ease}
.sc-close:hover{transform:scale(1.05);box-shadow:0 0 20px var(--glow-pink)}

@media(max-width:700px){
  :root{--pw:min(44vw,210px);--ph:min(70vw,360px)}
  .cb{font-size:.48rem;padding:6px 9px}
  #navL{left:4px}#navR{right:4px}
}
@media(max-width:480px){
  :root{--pw:min(85vw,330px);--ph:490px}
  #book{width:var(--pw);flex-direction:column}
  #rPanel{display:none}
  #lPanel{border-radius:8px}
  #book::after{display:none}
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

<div id="loader">
  <div class="ld-title">Radwa &amp; Nour ❤️</div>
  <div class="ld-track"><div class="ld-fill" id="ldFill"></div></div>
  <div class="ld-sub">Opening your book of memories…</div>
</div>

<button class="navbtn" id="navL">‹</button>
<button class="navbtn" id="navR">›</button>
<div id="pgCtr">Page <span id="pgNum">1</span> / 25</div>

<div id="scene">
  <div id="bookOuter">
    <div id="book">
      <!-- LEFT PANEL -->
      <div class="panel" id="lPanel">
        <div class="pbg"></div>
        <div class="fcard" id="lCard">
          <div class="face ffront" id="lFront"></div>
          <div class="face fback"  id="lBack"></div>
        </div>
        <div class="pshadow"></div>
      </div>
      <!-- RIGHT PANEL -->
      <div class="panel" id="rPanel">
        <div class="pbg"></div>
        <div class="fcard" id="rCard">
          <div class="face ffront" id="rFront"></div>
          <div class="face fback"  id="rBack"></div>
        </div>
        <div class="pshadow"></div>
      </div>
    </div>
  </div>
</div>

<div id="controls">
  <div id="viz"><div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div></div>
  <button class="cb" id="btnMusic">♪ Music</button>
  <button class="cb" id="btnHearts">💗 Hearts</button>
  <button class="cb" id="btnStars">✨ Stars</button>
  <button class="cb" id="btnSecret">🔐 Secret</button>
</div>

<div id="secret">
  <div class="sc-box">
    <div class="sc-ico">💌</div>
    <div class="sc-title">Only For You</div>
    <div class="sc-body">
      In every universe, in every lifetime,<br>
      I would find you again.<br><br>
      You are not just a memory —<br>
      you are the reason I believe in magic.<br><br>
      <strong>— Always, forever, and a little more. ❤️</strong>
    </div>
    <button class="sc-close" onclick="closeSecret()">Close ✕</button>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3" type="audio/mpeg">
</audio>

<script>
/* ═══ STAR CANVAS ═══ */
const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');
let stars=[];
function rszC(){bgC.width=innerWidth;bgC.height=innerHeight}
function mkS(){stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()*1.3+.2,a:Math.random(),da:(Math.random()*.007+.002)*(Math.random()<.5?1:-1),vx:(Math.random()-.5)*.05,vy:(Math.random()-.5)*.05})}
function drawS(){
  bgX.clearRect(0,0,bgC.width,bgC.height);
  stars.forEach(s=>{
    s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;
    s.x+=s.vx;s.y+=s.vy;
    if(s.x<0)s.x=bgC.width;if(s.x>bgC.width)s.x=0;
    if(s.y<0)s.y=bgC.height;if(s.y>bgC.height)s.y=0;
    bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgX.fillStyle=`rgba(255,255,255,${s.a*.75})`;bgX.fill();
  });requestAnimationFrame(drawS);
}
window.addEventListener('resize',()=>{rszC();mkS()});rszC();mkS();drawS();

/* ═══ PAGE DATA ═══ */
const MEM=[
  {title:"The First Hello",date:"A day that changed everything",text:"The moment our eyes met, time decided to slow down — as if the universe wanted us to notice each other.",emoji:"👋✨"},
  {title:"Our Favourite Spot",date:"Where we sat for hours",text:"That little corner of the world only we knew. We turned ordinary places into our own private universe.",emoji:"🌆🌸"},
  {title:"Late Night Talks",date:"When the world went quiet",text:"3 AM conversations that felt more real than anything. You were the only person I never ran out of things to say to.",emoji:"🌙💬"},
  {title:"Your Laugh",date:"The best sound I know",text:"The way you laugh with your whole body — I could bottle that sound and live off it forever.",emoji:"😂💛"},
  {title:"That One Song",date:"Still plays in my head",text:"Every time it comes on, I close my eyes and I'm right back there — with you, without a care.",emoji:"🎵🎶"},
  {title:"Dancing in the Rain",date:"We didn't care at all",text:"Soaked and laughing, completely ridiculous — that was when I knew I'd choose you every single time.",emoji:"🌧️💃"},
  {title:"Our Favourite Food",date:"Always ordered too much",text:"Every meal felt like a celebration just because you were sitting across from me.",emoji:"🍕🥰"},
  {title:"When You Cried",date:"And I held you close",text:"I wanted to take every pain from you. Watching you hurt is the hardest thing I know.",emoji:"🤍🌸"},
  {title:"Your Morning Voice",date:"Sleepy and so soft",text:"Half-awake, eyes barely open — still the most beautiful thing I'd ever seen in the morning light.",emoji:"☀️💫"},
  {title:"That Road Trip",date:"Windows down, music loud",text:"Miles with no real destination. As long as you were beside me, we were already there.",emoji:"🚗🗺️"},
  {title:"The Promise We Made",date:"Whispered under the stars",text:"We didn't need grand gestures. Just two quiet words — 'I'm here' — and they meant everything.",emoji:"⭐🤝"},
  {title:"Your Kindness",date:"That moves me every time",text:"The way you treat every person, every creature with such gentle care — you make the world better.",emoji:"💛🌿"},
  {title:"When We Got Lost",date:"And laughed about it",text:"The wrong turn that became an adventure. With you, even being lost feels like exactly where I should be.",emoji:"🗺️😄"},
  {title:"Stargazing Together",date:"The sky felt personal",text:"We named stars that night. I named the brightest one after you — it seemed only fair.",emoji:"🌠🔭"},
  {title:"Your Birthday Last Year",date:"I wanted it to be perfect",text:"All I wanted was to see your eyes light up. When they did, I felt like I'd won the whole world.",emoji:"🎂🎉"},
  {title:"Inside Jokes",date:"Only we understand",text:"Just one look across a crowded room and we both lose it completely. Our own secret language of joy.",emoji:"🤣💜"},
  {title:"When Time Stood Still",date:"A perfect quiet moment",text:"No words, no movement — just us, breathing the same air, knowing this was one to always remember.",emoji:"⏳🌸"},
  {title:"Your Strength",date:"You never knew I noticed",text:"The battles you fought silently, the grace you carried hardship with — you are so much stronger than you know.",emoji:"💪🌟"},
  {title:"Every Little Thing",date:"The ones that add up to everything",text:"Every small moment with you is a whole world I'd choose to live in over and over, endlessly.",emoji:"📖❤️"},
];
const POE=[
  {text:`In the quiet spaces between your words,<br>I found a home I hadn't known I was searching for.<br><br>You are the poem I never knew how to write<br>until you walked into the room and <em>everything made sense.</em>`,lbl:"I. Home"},
  {text:`Time is strange — it moves fast and slow<br>depending on whether you're with me.<br><br>With you, I want the clocks to stop.<br>Without you, I count every second<br>until the next time I hear <em>your voice.</em>`,lbl:"II. Time"},
  {text:`If I could save one thing from this world —<br>one fragment to carry into whatever comes next —<br><br>it would be the memory of you laughing,<br>completely free, completely yourself,<br><em>completely mine to witness.</em>`,lbl:"III. Saved"},
  {text:`They say love is a feeling.<br>But with you it is a place —<br>a soft, lit room I return to<br>no matter how far I wander.<br><br>You are my <em>constant.</em><br>You are my <em>home.</em>`,lbl:"IV. Constant"},
];

/* ═══ BUILD 25 PAGES ═══ */
function makeCover(){
  return`<div class="pg" style="background:radial-gradient(ellipse at center,#1a0030 0%,#030007 80%)">
    <div class="cv-roses">🌹 🌸 🌹</div>
    <div class="cv-img">💑</div>
    <div class="cv-title">Radwa &amp; Nour ❤️</div>
    <div class="cv-line"></div>
    <div class="cv-sub">A Book Full of Us</div>
    <div class="cv-hint">✦ touch to open ✦</div>
    <div class="pgn r">1</div>
  </div>`;
}
function makeMem(m,i){
  return`<div class="pg">
    <div class="mtag">Memory ${String(i+1).padStart(2,'0')}</div>
    <div class="mtitle">${m.title}</div>
    <div class="deco"></div>
    <div class="mthumb"><div class="big">${m.emoji}</div><span>Add your photo here</span></div>
    <div class="deco"></div>
    <div class="mbody">${m.text}</div>
    <div class="mdate">✦ ${m.date} ✦</div>
    <div class="pgn ${i%2===0?'l':'r'}">${i+2}</div>
  </div>`;
}
function makePoe(p,i){
  return`<div class="pg po">
    <div class="po-orn">❧</div>
    <div class="po-body">${p.text}</div>
    <div class="po-orn">❧</div>
    <div class="po-lbl">${p.lbl}</div>
    <div class="pgn ${i%2===0?'l':'r'}">${21+i}</div>
  </div>`;
}
function makeBday(){
  return`<div class="pg bd">
    <div class="bd-ico">🎂</div>
    <div class="bd-title">Happy Birthday, Nour 🎉</div>
    <div class="bd-sub">Counting down to your special day…</div>
    <div class="cd-row">
      <div class="cdb"><span class="cdn" id="cdD">--</span><span class="cdl">Days</span></div>
      <div class="cdb"><span class="cdn" id="cdH">--</span><span class="cdl">Hrs</span></div>
      <div class="cdb"><span class="cdn" id="cdM">--</span><span class="cdl">Mins</span></div>
      <div class="cdb"><span class="cdn" id="cdS">--</span><span class="cdl">Secs</span></div>
    </div>
    <div class="bd-msg">Every year I get to celebrate you feels like the universe giving me the greatest gift. You are <span>irreplaceable, infinite, and so very loved.</span></div>
    <div class="pgn r">25</div>
  </div>`;
}

// ALL 25 pages array (index 0–24)
const PAGES=[];
PAGES.push(makeCover());
MEM.forEach((m,i)=>PAGES.push(makeMem(m,i)));
POE.forEach((p,i)=>PAGES.push(makePoe(p,i)));
PAGES.push(makeBday());
const TOTAL=PAGES.length; // 25

/* ═══ FLIP ENGINE ═══
   We display TWO pages at a time (a spread).
   spread=0 → cover only (left=page0, right=blank)
   spread=k → left=page(2k-1), right=page(2k)  (k≥1)
   maxSpread = ceil((25-1)/2) = 12
*/
let spread=0, flipping=false;
const maxSpread=Math.ceil((TOTAL-1)/2);

function spreadIdx(s){
  if(s===0)return{l:0,r:null};
  const l=2*s-1, r=2*s;
  return{l:l<TOTAL?l:null, r:r<TOTAL?r:null};
}

function renderFace(el,idx){
  if(idx===null||idx===undefined||idx<0||idx>=TOTAL){
    el.innerHTML='<div class="pg" style="background:#0a0012"></div>';
  } else {
    el.innerHTML=PAGES[idx];
    if(idx===24)initCountdown();
  }
}

function renderSpread(s){
  const{l,r}=spreadIdx(s);
  renderFace(document.getElementById('lFront'),l);
  renderFace(document.getElementById('rFront'),r);
  const pg=s===0?1:Math.min(2*s,25);
  document.getElementById('pgNum').textContent=pg;
}

/* ── FLIP FORWARD ── */
function flipNext(){
  if(flipping||spread>=maxSpread)return;
  flipping=true;
  const ns=spread+1;
  const{l,r}=spreadIdx(ns);

  // preload backs with NEXT spread content
  renderFace(document.getElementById('lBack'),l);
  renderFace(document.getElementById('rBack'),r);

  // animate
  const lc=document.getElementById('lCard');
  const rc=document.getElementById('rCard');
  lc.classList.add('flip');
  rc.classList.add('flip');
  playFlip();
  spawnF(Math.random()<.5?'🌸':'✨');

  setTimeout(()=>{
    spread=ns;
    renderSpread(spread);
    lc.classList.remove('flip');
    rc.classList.remove('flip');
    flipping=false;
  },720);
}

/* ── FLIP BACK ── */
function flipPrev(){
  if(flipping||spread<=0)return;
  flipping=true;
  const ps=spread-1;
  const{l,r}=spreadIdx(ps);

  // preload backs with PREV spread
  renderFace(document.getElementById('lBack'),l);
  renderFace(document.getElementById('rBack'),r);

  const lc=document.getElementById('lCard');
  const rc=document.getElementById('rCard');

  // Jump to flipped state instantly (no transition), then animate back
  lc.style.transition='none';rc.style.transition='none';
  lc.classList.add('flip');rc.classList.add('flip');

  // force reflow
  lc.getBoundingClientRect();rc.getBoundingClientRect();

  // re-enable transition and remove class → animates back
  lc.style.transition='';rc.style.transition='';
  lc.classList.remove('flip');rc.classList.remove('flip');
  playFlip();
  spawnF(Math.random()<.5?'💗':'⭐');

  setTimeout(()=>{
    spread=ps;
    renderSpread(spread);
    flipping=false;
  },720);
}

/* ═══ COUNTDOWN ═══ */
let cdTimer=null;
function initCountdown(){
  if(cdTimer)clearInterval(cdTimer);
  function tick(){
    const now=new Date();
    let t=new Date(now.getFullYear(),5,27,0,0,0);
    if(now>=t)t=new Date(now.getFullYear()+1,5,27,0,0,0);
    const df=t-now;
    const d=Math.floor(df/86400000);
    const h=Math.floor((df%86400000)/3600000);
    const m=Math.floor((df%3600000)/60000);
    const s=Math.floor((df%60000)/1000);
    const p=n=>String(n).padStart(2,'0');
    const g=id=>document.getElementById(id);
    if(g('cdD')){g('cdD').textContent=d;g('cdH').textContent=p(h);g('cdM').textContent=p(m);g('cdS').textContent=p(s)}
    else clearInterval(cdTimer);
  }
  tick();cdTimer=setInterval(tick,1000);
}

/* ═══ SOUND ═══ */
function playFlip(){
  try{
    const a=new(window.AudioContext||window.webkitAudioContext)();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.frequency.setValueAtTime(900,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(200,a.currentTime+.13);
    g.gain.setValueAtTime(.07,a.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.18);
    o.start(a.currentTime);o.stop(a.currentTime+.18);
  }catch(e){}
}

/* ═══ FLOATERS ═══ */
function spawnF(emoji,x,y){
  const el=document.createElement('div');
  el.className='floater';el.textContent=emoji;
  el.style.left=(x??Math.random()*innerWidth)+'px';
  el.style.top=(y??innerHeight)+'px';
  el.style.animationDuration=(2.4+Math.random()*2.4)+'s';
  el.style.fontSize=(.7+Math.random()*1.1)+'rem';
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}
function hearts(n=14){const h=['💗','💕','❤️','💖','💝','🌸'];for(let i=0;i<n;i++)setTimeout(()=>spawnF(h[~~(Math.random()*h.length)]),i*70)}
function stars2(n=18){const s=['✨','⭐','🌟','💫','🌠'];for(let i=0;i<n;i++)setTimeout(()=>spawnF(s[~~(Math.random()*s.length)]),i*55)}

// cursor hearts
let lastH=0;
document.addEventListener('mousemove',e=>{
  if(Date.now()-lastH>700&&Math.random()<.11){spawnF('💗',e.clientX,e.clientY);lastH=Date.now()}
});

/* ═══ MUSIC ═══ */
let musOn=false;

const vbs=document.querySelectorAll('.vb');
document.getElementById('btnMusic').addEventListener('click',()=>{
  musOn=!musOn;
  if(musOn){bgM.play().catch(()=>{});vbs.forEach(b=>b.classList.add('on'));document.getElementById('btnMusic').classList.add('on')}
  else{bgM.pause();vbs.forEach(b=>b.classList.remove('on'));document.getElementById('btnMusic').classList.remove('on')}
  hearts(4);
});
document.getElementById('btnHearts').addEventListener('click',()=>hearts(22));
document.getElementById('btnStars').addEventListener('click',()=>stars2(26));
document.getElementById('btnSecret').addEventListener('click',()=>{
  document.getElementById('secret').classList.add('open');
  hearts(28);stars2(18);
});
function closeSecret(){document.getElementById('secret').classList.remove('open')}
document.getElementById('secret').addEventListener('click',e=>{if(e.target===document.getElementById('secret'))closeSecret()});

/* ═══ NAV ═══ */
document.getElementById('navR').addEventListener('click',flipNext);
document.getElementById('navL').addEventListener('click',flipPrev);
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')flipNext();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')flipPrev();
});
// swipe
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>48){dx<0?flipNext():flipPrev()}},{passive:true});

// cover click
document.getElementById('lPanel').addEventListener('click',()=>{
  if(spread===0){flipNext();hearts(8)}
});

/* ═══ LOADER → BOOT ═══ */
const ldF=document.getElementById('ldFill');
let prog=0;
const ldI=setInterval(()=>{
  prog+=Math.random()*13;
  if(prog>=100){prog=100;clearInterval(ldI);boot()}
  ldF.style.width=prog+'%';
},90);

function boot(){
  renderSpread(0); // render cover
  setTimeout(()=>document.getElementById('loader').classList.add('hide'),300);
  setTimeout(()=>{
    document.getElementById('bookOuter').classList.add('show');
    document.getElementById('controls').classList.add('show');
    document.getElementById('pgCtr').classList.add('show');
    document.getElementById('navL').classList.add('show');
    document.getElementById('navR').classList.add('show');
  },700);
  setTimeout(()=>hearts(6),1900);
}
</script>
